<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – MedIntel</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#e8f5f3; overflow:hidden; }
    .bg { position:fixed; inset:0; background:radial-gradient(ellipse at 20% 50%,rgba(13,148,136,.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(15,118,110,.14) 0%,transparent 55%),linear-gradient(135deg,#d4eeea 0%,#e8f5f3 40%,#cce8e3 100%); z-index:0; }
    .grid-pattern { position:fixed; inset:0; background-image:radial-gradient(rgba(13,148,136,.08) 1px,transparent 1px); background-size:40px 40px; z-index:0; }
    .orb { position:fixed; border-radius:50%; filter:blur(90px); opacity:.25; z-index:0; pointer-events:none; animation:orbFloat ease-in-out infinite; }
    .orb1 { width:350px; height:350px; background:#5eead4; top:-80px; left:-80px; animation-duration:12s; }
    .orb2 { width:250px; height:250px; background:#14b8a6; bottom:-60px; right:-60px; animation-duration:15s; }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-15px);} }

    .card { position:relative; z-index:10; width:100%; max-width:430px; margin:20px; background:rgba(255,255,255,.75); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,.9); border-radius:24px; padding:44px 40px 40px; box-shadow:0 20px 60px rgba(13,148,136,.12),0 4px 16px rgba(0,0,0,.06); animation:cardIn .6s cubic-bezier(.22,1,.36,1) both; }
    @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);} }

    .logo { display:flex; flex-direction:column; align-items:center; margin-bottom:26px; text-decoration:none; }
    .logo-icon { width:60px; height:60px; border-radius:18px; background:linear-gradient(135deg,#14b8a6,#0d9488); display:flex; align-items:center; justify-content:center; font-size:30px; margin-bottom:14px; box-shadow:0 6px 24px rgba(20,184,166,.45); }
    .logo-name { font-family:'Fraunces',serif; font-size:28px; font-weight:900; color:#0f172a; letter-spacing:-.5px; }
    .logo-sub { font-size:12px; color:#94a3b8; margin-top:4px; letter-spacing:1.5px; text-transform:uppercase; }

    .form-title { font-size:18px; font-weight:700; color:#0f172a; margin-bottom:4px; text-align:center; }
    .form-sub { font-size:13px; color:#64748b; margin-bottom:24px; text-align:center; }

    .btn-google { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:14px 20px; border-radius:12px; border:1.5px solid #e2e8f0; background:#fff; font-size:15px; font-weight:600; font-family:'DM Sans',sans-serif; color:#0f172a; cursor:pointer; text-decoration:none; transition:all .2s; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .btn-google:hover { border-color:#14b8a6; background:#f0fdfa; color:#0f766e; transform:translateY(-2px); box-shadow:0 6px 20px rgba(13,148,136,.15); }

    .msg-box { border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .msg-error { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.25); color:#dc2626; }

    .bottom-note { text-align:center; margin-top:20px; font-size:12px; color:#94a3b8; }

    .bottom-link { text-align:center; margin-top:10px; font-size:13px; color:#64748b; }
    .bottom-link a { color:#0d9488; font-weight:600; text-decoration:none; }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="grid-pattern"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <a href="/" class="logo">
    <div class="logo-icon">🩺</div>
    <div class="logo-name">MedIntel</div>
    <div class="logo-sub">Health Monitor</div>
  </a>

  <div class="form-title">Welcome back 👋</div>
  <div class="form-sub">Sign in to your MedIntel account</div>

  {% if error %}
  <div class="msg-box msg-error">⚠️ {{ error }}</div>
  {% endif %}

  <a href="/auth/google" class="btn-google">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.9 29.3 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 6 1.1 8.2 3l5.7-5.7C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.3-.2-2.7-.4-4z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3.1 0 6 1.1 8.2 3l5.7-5.7C34.6 5.1 29.6 3 24 3 16.3 3 9.7 7.9 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 45c5.5 0 10.4-1.9 14.3-5l-6.6-5.4C29.7 36.5 27 37 24 37c-5.2 0-9.6-3.1-11.3-7.6l-6.5 5C9.5 40.9 16.3 45 24 45z"/>
      <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.5 4.6-4.6 6l6.6 5.4C41 35.8 44 30.4 44 24c0-1.3-.2-2.7-.4-4z"/>
    </svg>
    Continue with Google
  </a>

  <div class="bottom-note">🔒 Secured with Google OAuth 2.0</div>
  <div class="bottom-link">Don't have an account? <a href="/register">Create one free →</a></div>
</div>
</body>
</html>
