<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Registration – MedIntel</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#e8f5f3; overflow:hidden; }
    .bg { position:fixed; inset:0; background:radial-gradient(ellipse at 20% 50%,rgba(13,148,136,.18) 0%,transparent 60%),linear-gradient(135deg,#d4eeea 0%,#e8f5f3 40%,#cce8e3 100%); z-index:0; }
    .orb { position:fixed; border-radius:50%; filter:blur(90px); opacity:.25; z-index:0; pointer-events:none; animation:orbFloat ease-in-out infinite; }
    .orb1 { width:350px; height:350px; background:#5eead4; top:-80px; left:-80px; animation-duration:12s; }
    .orb2 { width:250px; height:250px; background:#14b8a6; bottom:-60px; right:-60px; animation-duration:15s; }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-15px);} }

    .card { position:relative; z-index:10; width:100%; max-width:440px; margin:20px; background:rgba(255,255,255,.75); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,.9); border-radius:24px; padding:40px 40px 36px; box-shadow:0 20px 60px rgba(13,148,136,.12),0 4px 16px rgba(0,0,0,.06); animation:cardIn .6s cubic-bezier(.22,1,.36,1) both; }
    @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);} }

    .logo { display:flex; flex-direction:column; align-items:center; margin-bottom:20px; text-decoration:none; }
    .logo-icon { width:58px; height:58px; border-radius:17px; background:linear-gradient(135deg,#14b8a6,#0d9488); display:flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:12px; box-shadow:0 6px 24px rgba(20,184,166,.4); }
    .logo-name { font-family:'Fraunces',serif; font-size:26px; font-weight:900; color:#0f172a; }

    .verified-badge { display:flex; align-items:center; gap:8px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; padding:10px 14px; margin-bottom:18px; font-size:13px; color:#166534; font-weight:600; }

    .form-title { font-size:18px; font-weight:700; color:#0f172a; margin-bottom:4px; }
    .form-sub { font-size:13px; color:#64748b; margin-bottom:20px; }

    .input-group { margin-bottom:12px; }
    .input-label { font-size:12px; font-weight:600; color:#475569; text-transform:uppercase; letter-spacing:.6px; margin-bottom:7px; display:block; }
    .input-wrap { display:flex; align-items:center; background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:12px; transition:border-color .2s; overflow:hidden; }
    .input-wrap:focus-within { border-color:#14b8a6; background:#f0fdfa; box-shadow:0 0 0 3px rgba(20,184,166,.12); }
    .input-icon { padding:0 14px; font-size:15px; color:#94a3b8; flex-shrink:0; }
    .input-wrap input, .input-wrap select { flex:1; padding:12px 14px 12px 0; background:transparent; border:none; font-size:14px; font-family:'DM Sans',sans-serif; color:#0f172a; outline:none; margin:0; width:100%; }

    .role-row { display:flex; gap:10px; margin-bottom:12px; }
    .role-btn { flex:1; padding:11px 10px; border-radius:11px; border:1.5px solid #e2e8f0; background:#f8fafc; font-size:13px; font-weight:600; color:#64748b; cursor:pointer; text-align:center; transition:all .18s; font-family:'DM Sans',sans-serif; }
    .role-btn.active { border-color:#14b8a6; background:#f0fdfa; color:#0f766e; }

    .btn-submit { width:100%; padding:13px; border-radius:12px; border:none; background:linear-gradient(135deg,#14b8a6,#0d9488); color:#fff; font-size:15px; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; margin-top:6px; transition:all .2s; box-shadow:0 4px 20px rgba(20,184,166,.35); }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(20,184,166,.5); }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <a href="/" class="logo">
    <div class="logo-icon">🩺</div>
    <div class="logo-name">MedIntel</div>
  </a>

  <div class="verified-badge">
    <svg width="16" height="16" viewBox="0 0 48 48" style="flex-shrink:0">
      <path fill="#34d399" d="M43.6 20H24v8h11.3C33.7 33.9 29.3 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 6 1.1 8.2 3l5.7-5.7C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.3-.2-2.7-.4-4z"/>
    </svg>
    Google verified: <span style="color:#0f766e;">{{ email }}</span>
  </div>

  <div class="form-title">Almost done! 🎉</div>
  <div class="form-sub">Just pick your role to finish setup</div>

  <form method="POST">
    <!-- Name prefilled from Google, readonly -->
    <input type="hidden" name="name" value="{{ google_name }}">

    <div class="input-group">
      <label class="input-label">Full Name</label>
      <div class="input-wrap">
        <div class="input-icon">🧑</div>
        <input type="text" value="{{ google_name }}" readonly
          style="opacity:.7; background:#f0fdfa; cursor:default;">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">Register As</label>
      <div class="role-row">
        <div class="role-btn active" id="btn-patient" onclick="selectRole('patient')">🧑 Patient</div>
        <div class="role-btn" id="btn-doctor" onclick="selectRole('doctor')">👨‍⚕️ Doctor</div>
      </div>
      <input type="hidden" name="role" id="role-input" value="patient">
    </div>

    <div class="input-group" id="spec-group" style="display:none;">
      <label class="input-label">Specialization</label>
      <div class="input-wrap">
        <div class="input-icon">🏥</div>
        <select name="specialization">
          <option>🩺 General Physician</option>
          <option>❤️ Cardiologist</option>
          <option>🩸 Endocrinologist</option>
          <option>🧠 Neurologist</option>
          <option>🦴 Orthopedist</option>
          <option>🧴 Dermatologist</option>
          <option>👶 Pediatrician</option>
          <option>🧘 Psychiatrist</option>
        </select>
      </div>
    </div>

    <button type="submit" class="btn-submit">🚀 Complete Registration</button>
  </form>
</div>

<script>
function selectRole(role) {
  document.getElementById('role-input').value = role;
  document.getElementById('btn-patient').classList.toggle('active', role === 'patient');
  document.getElementById('btn-doctor').classList.toggle('active', role === 'doctor');
  document.getElementById('spec-group').style.display = role === 'doctor' ? 'block' : 'none';
}
</script>
</body>
</html>
